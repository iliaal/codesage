name: Audit

on:
  schedule:
    # Daily at 06:17 UTC. Off-peak hour, prime number minute to avoid
    # synchronizing with everyone else's :00/:15/:30 cron jobs.
    - cron: '17 6 * * *'
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.github/workflows/audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # taiki-e/install-action downloads a pre-built binary, faster than
      # `cargo install --locked cargo-audit` which has to compile from source.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
