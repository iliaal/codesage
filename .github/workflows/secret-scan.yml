name: Secret scan

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: read

jobs:
  leak-patterns:
    name: scripts/leak-check.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so --range can resolve the base SHA.
          fetch-depth: 0
      - name: Run leak check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            echo "Scanning $base..$head"
            ./scripts/leak-check.sh --range "$base..$head"
          else
            echo "Scanning all tracked files at HEAD"
            ./scripts/leak-check.sh --all
          fi

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
